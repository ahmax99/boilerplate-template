pre-commit:
  parallel: true
  jobs:
    - name: biome
      glob: '*.{ts,tsx,js,jsx,yml,yaml}'
      run: bunx biome check --write --no-errors-on-unmatched --files-ignore-unknown=true {staged_files}
      stage_fixed: true

    - name: terraform-fmt
      glob:
        - 'infra/terraform/*.{tf,tfvars}'
        - 'infra/terraform/**/*.{tf,tfvars}'
      run: terraform -chdir=infra/terraform fmt -recursive
      stage_fixed: true

commit-msg:
  commands:
    commitlint:
      run: bunx commitlint --edit {1}

pre-push:
  commands:
    check-types-build:
      run: bunx turbo run check-types build --affected

post-commit:
  scripts:
    'update-graph.sh':
      runner: sh
