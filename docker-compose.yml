services:
  backend:
    build:
      context: .
      dockerfile: ./apps/backend/Dockerfile
      args:
        TURBO_TOKEN: ${TURBO_TOKEN}
        TURBO_TEAM: ${TURBO_TEAM}
    container_name: boilerplate-template-backend
    restart: unless-stopped
    ports:
      - '${BACKEND_PORT}:${BACKEND_PORT}'
    env_file:
      - .env
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:${BACKEND_PORT}/api/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
      args:
        TURBO_TOKEN: ${TURBO_TOKEN}
        TURBO_TEAM: ${TURBO_TEAM}
        NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: boilerplate-template-web
    restart: unless-stopped
    ports:
      - '${WEB_PORT}:${WEB_PORT}'
    env_file:
      - .env
    environment:
      - API_URL=http://backend:${BACKEND_PORT}/api # Required for internal Docker networking
      - NEXT_PUBLIC_NODE_ENV=production # Ensures correct env is always set
    networks:
      - app-network
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:${WEB_PORT}/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  app-network:
    driver: bridge
