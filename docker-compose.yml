version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: ./apps/backend/Dockerfile
      args:
        TURBO_TOKEN: ${TURBO_TOKEN}
        TURBO_TEAM: ${TURBO_TEAM}
    container_name: boilerplate-template-backend
    restart: unless-stopped
    ports:
      - '${BACKEND_PORT}:${BACKEND_PORT}'
    env_file:
      - .env
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:${BACKEND_PORT}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
      args:
        TURBO_TOKEN: ${TURBO_TOKEN}
        TURBO_TEAM: ${TURBO_TEAM}
    container_name: boilerplate-template-web
    restart: unless-stopped
    ports:
      - '${WEB_PORT}:${WEB_PORT}'
    env_file:
      - .env
    networks:
      - app-network
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:${WEB_PORT}/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  app-network:
    driver: bridge
