name: Create/Delete Branch for Pull Request

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    outputs:
      neon: ${{ steps.filter.outputs.neon }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          filters: |
            neon:
              - 'shared/neon/**'
              - 'apps/backend-boilerplate/**'
              - '.github/workflows/neon-workflow.yml'

  setup:
    name: Setup
    permissions:
      contents: read
    outputs:
      branch: ${{ steps.branch_name.outputs.current_branch }}
    needs: changes
    if: |
      needs.changes.outputs.neon == 'true' &&
      github.event.pull_request.user.login != 'dependabot[bot]' &&
      !startsWith(github.head_ref, 'release-please--branches--') &&
      github.event_name == 'pull_request' && (
      github.event.action == 'synchronize' || github.event.action == 'opened' || github.event.action == 'reopened' || github.event.action == 'closed')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Get branch name
        id: branch_name
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: echo "current_branch=$HEAD_REF" >> "$GITHUB_OUTPUT"

  create_neon_branch:
    name: Create Neon Branch
    permissions:
      contents: read
      pull-requests: write
    outputs:
      db_url: ${{ steps.create_neon_branch.outputs.db_url }}
      db_url_pooled: ${{ steps.create_neon_branch.outputs.db_url_pooled }}
    needs: [changes, setup]
    if: |
      needs.changes.outputs.neon == 'true' &&
      github.event.pull_request.user.login != 'dependabot[bot]' &&
      !startsWith(github.head_ref, 'release-please--branches--') &&
      github.event_name == 'pull_request' && (
      github.event.action == 'synchronize' || github.event.action == 'opened' || github.event.action == 'reopened')
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Get branch expiration date as an env variable (2 weeks from now)
        id: get_expiration_date
        run: echo "EXPIRES_AT=$(date -u --date '+14 days' +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"
      - name: Create Neon Branch
        id: create_neon_branch
        uses: neondatabase/create-branch-action@fb620d43d4c565abaf088b848a4e28e5c4ea4d9c # v6
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: preview/pr-${{ github.event.number }}-${{ needs.setup.outputs.branch }}
          api_key: ${{ secrets.NEON_API_KEY }}
          expires_at: ${{ env.EXPIRES_AT }}

      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run Migrations
        run: bunx --bun turbo run db:deploy --filter=@shared/neon
        env:
          DATABASE_URL: "${{ steps.create_neon_branch.outputs.db_url_pooled }}"

      - name: Post Schema Diff Comment to PR
        uses: neondatabase/schema-diff-action@80cfa8521628e890015b60f5291a7738926617dc # v1
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          compare_branch: preview/pr-${{ github.event.number }}-${{ needs.setup.outputs.branch }}
          api_key: ${{ secrets.NEON_API_KEY }}

  delete_neon_branch:
    name: Delete Neon Branch
    permissions:
      contents: read
    needs: [changes, setup]
    if: needs.changes.outputs.neon == 'true' && github.event.pull_request.user.login != 'dependabot[bot]' && !startsWith(github.head_ref, 'release-please--branches--') && github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Delete Neon Branch
        uses: neondatabase/delete-branch-action@4468d825d5a88ef4012f1705a82f02ec3072f776 # v3
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch: preview/pr-${{ github.event.number }}-${{ needs.setup.outputs.branch }}
          api_key: ${{ secrets.NEON_API_KEY }}