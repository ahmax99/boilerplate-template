name: Security Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: security-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    outputs:
      terraform: ${{ steps.filter.outputs.terraform }}
      non_infra: ${{ steps.filter.outputs.non_infra }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          filters: |
            terraform:
              - 'infra/**'
            non_infra:
              - '**'
              - '!infra/**'

  terraform-security-scan:
    name: Terraform Security Scan (Trivy)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: changes
    if: needs.changes.outputs.terraform == 'true' && !startsWith(github.head_ref, 'release-please--branches--')
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Run Trivy IaC scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: config
          scan-ref: infra
          trivyignores: infra/.trivyignore
          severity: CRITICAL,HIGH
          exit-code: '1'

  package-audit:
    name: Package Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: changes
    if: needs.changes.outputs.non_infra == 'true' && !startsWith(github.head_ref, 'release-please--branches--')
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Cache turbo build setup
        uses: actions/cache@v6
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Security audit
        run: bun audit --audit-level=high

  sbom-check:
    name: SBOM & Vulnerability Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: changes
    if: needs.changes.outputs.non_infra == 'true' && github.actor != 'dependabot[bot]' && !startsWith(github.head_ref, 'release-please--branches--')
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: cyclonedx-json
          artifact-name: sbom.json
          output-file: sbom.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v7
        with:
          name: sbom-files
          path: sbom.json

      - name: Scan SBOM and summarize results
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        id: grype
        continue-on-error: true
        with:
          sbom: sbom.json
          fail-build: true
          severity-cutoff: high

      - name: Fail on high severity vulnerabilities
        run: |
          echo "============================ Summary ============================"
          if [[ "${{ steps.grype.outcome }}" != "success" ]]; then
            echo "❌ Dependencies contain HIGH severity vulnerabilities."
            echo "💡 To fix vulnerabilities:"
            echo "- Run: bun update"
            echo "- Or update dependencies manually (see SBOM scan output above)"
            echo "- Then re-run this workflow to confirm"
            exit 1
          else
            echo "✅ Dependencies passed security check."
          fi
