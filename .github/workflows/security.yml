name: Security Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  package-audit:
    name: Package Audit
    runs-on: ubuntu-latest
    if: "!startsWith(github.head_ref, 'release-please--branches--')"
    permissions:
      contents: read
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache turbo build setup
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Security audit
        run: bun audit --audit-level=high

  sbom-check:
    name: SBOM & Vulnerability Check
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]' && !startsWith(github.head_ref, 'release-please--branches--')
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate SBOM
        uses: anchore/sbom-action@v0.24.0
        with:
          path: .
          format: cyclonedx-json
          artifact-name: sbom.json
          output-file: sbom.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-files
          path: sbom.json

      - name: Scan SBOM and summarize results
        uses: anchore/scan-action@v7.4.0
        id: grype
        with:
          sbom: sbom.json
          fail-build: false
          severity-cutoff: high

      - name: Fail on high severity vulnerabilities
        run: |
          echo "============================ Summary ============================"
          if [[ "${{ steps.grype.outputs.check-passed }}" != "true" ]]; then
            echo "❌ Dependencies contain HIGH severity vulnerabilities."
            echo "💡 To fix vulnerabilities:"
            echo "- Run: bun update"
            echo "- Or update dependencies manually (see SBOM scan output above)"
            echo "- Then re-run this workflow to confirm"
            exit 1
          else
            echo "✅ Dependencies passed security check."
          fi
