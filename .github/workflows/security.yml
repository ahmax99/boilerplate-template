name: Security Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      terraform: ${{ steps.filter.outputs.terraform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            terraform:
              - 'infra/terraform/**'

  terraform-security-scan:
    name: Terraform Security Scan (Trivy)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.terraform == 'true' && !startsWith(github.head_ref, 'release-please--branches--')
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy IaC scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: infra/terraform
          trivyignores: infra/terraform/.trivyignore
          severity: CRITICAL,HIGH
          exit-code: '1'

  package-audit:
    name: Package Audit
    runs-on: ubuntu-latest
    if: "!startsWith(github.head_ref, 'release-please--branches--')"
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache turbo build setup
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Security audit
        run: bun audit --audit-level=high

  sbom-check:
    name: SBOM & Vulnerability Check
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]' && !startsWith(github.head_ref, 'release-please--branches--')
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate SBOM
        uses: anchore/sbom-action@v0.24.0
        with:
          path: .
          format: cyclonedx-json
          artifact-name: sbom.json
          output-file: sbom.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-files
          path: sbom.json

      - name: Scan SBOM and summarize results
        uses: anchore/scan-action@v7.4.0
        id: grype
        continue-on-error: true
        with:
          sbom: sbom.json
          fail-build: true
          severity-cutoff: high

      - name: Fail on high severity vulnerabilities
        run: |
          echo "============================ Summary ============================"
          if [[ "${{ steps.grype.outcome }}" != "success" ]]; then
            echo "❌ Dependencies contain HIGH severity vulnerabilities."
            echo "💡 To fix vulnerabilities:"
            echo "- Run: bun update"
            echo "- Or update dependencies manually (see SBOM scan output above)"
            echo "- Then re-run this workflow to confirm"
            exit 1
          else
            echo "✅ Dependencies passed security check."
          fi
