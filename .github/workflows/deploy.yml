name: Deploy to AWS Lambda

on:
  push:
    branches:
      - main
    paths:
      - 'apps/backend-boilerplate/**'
      - 'apps/nextjs-boilerplate/**'
      - 'shared/**'
      - 'package.json'
      - 'bun.lockb'
      - '.github/workflows/deploy.yml'
      - '.github/actions/deploy-backend/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        type: environment
        default: stg

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  NODE_VERSION: '24'
  DEPLOY_ENV: ${{ github.event_name == 'push' && 'dev' || github.event.inputs.environment }}

concurrency:
  group: deploy-${{ github.event_name == 'push' && 'dev' || github.event.inputs.environment }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and Deploy Lambda
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'push' && 'dev' || github.event.inputs.environment }}
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-Deploy

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/backend-boilerplate/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          tags: |
            ${{ vars.ECR_BACKEND_REPOSITORY_URL }}:${{ github.sha }}
            ${{ vars.ECR_BACKEND_REPOSITORY_URL }}:latest
          build-args: |
            DATABASE_URL=postgresql://placeholder:placeholder@placeholder:5432/placeholder?schema=public
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/nextjs-boilerplate/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          tags: |
            ${{ vars.ECR_FRONTEND_REPOSITORY_URL }}:${{ github.sha }}
            ${{ vars.ECR_FRONTEND_REPOSITORY_URL }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_BASE_URL=${{ vars.NEXT_PUBLIC_BASE_URL }}
            NEXT_PUBLIC_SENTRY_DSN=${{ vars.NEXT_PUBLIC_SENTRY_DSN }}

      - name: Deploy backend Lambda
        id: deploy_backend
        uses: ./.github/actions/deploy-lambda
        with:
          function-name: ${{ vars.PROJECT_NAME }}-${{ env.DEPLOY_ENV }}-backend
          image-uri: ${{ vars.ECR_BACKEND_REPOSITORY_URL }}:${{ github.sha }}
          alias-name: ${{ env.DEPLOY_ENV }}
          codedeploy-app: ${{ vars.PROJECT_NAME }}-${{ env.DEPLOY_ENV }}-backend
          codedeploy-group: ${{ vars.PROJECT_NAME }}-${{ env.DEPLOY_ENV }}-backend-dg
          aws-region: ${{ env.AWS_REGION }}
          git-sha: ${{ github.sha }}
          release-tag: ${{ github.sha }}

      - name: Deploy frontend Lambda
        id: deploy_frontend
        uses: ./.github/actions/deploy-lambda
        with:
          function-name: ${{ vars.PROJECT_NAME }}-${{ env.DEPLOY_ENV }}-frontend
          image-uri: ${{ vars.ECR_FRONTEND_REPOSITORY_URL }}:${{ github.sha }}
          alias-name: ${{ env.DEPLOY_ENV }}
          codedeploy-app: ${{ vars.PROJECT_NAME }}-${{ env.DEPLOY_ENV }}-frontend
          codedeploy-group: ${{ vars.PROJECT_NAME }}-${{ env.DEPLOY_ENV }}-frontend-dg
          aws-region: ${{ env.AWS_REGION }}
          git-sha: ${{ github.sha }}
          release-tag: ${{ github.sha }}

      - name: Deploy static assets and invalidate CloudFront
        uses: ./.github/actions/deploy-static-assets
        with:
          image-uri: ${{ vars.ECR_FRONTEND_REPOSITORY_URL }}:${{ github.sha }}
          static-assets-bucket: ${{ vars.STATIC_ASSETS_BUCKET }}
          cloudfront-distribution-id: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}
          aws-region: ${{ env.AWS_REGION }}