name: Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'apps/backend-boilerplate/**'
      - 'apps/nextjs-boilerplate/**'
      - 'shared/**'
      - 'package.json'
      - 'bun.lock'
      - '.github/workflows/deploy.yml'
      - '.github/actions/detect-affected/**'
      - '.github/actions/deploy-lambda/**'
      - '.github/actions/deploy-static-assets/**'
      - '.github/scripts/**'
    tags:
      - 'v*'
  workflow_dispatch: # dev only — prod requires a v* tag push

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  # Semver tag for releases; SHA for day-to-day branch pushes and manual dispatch
  IMAGE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || github.sha }}

concurrency:
  group: deploy-${{ github.ref_type == 'tag' && github.ref_name || 'dev' }}
  cancel-in-progress: ${{ github.ref_type != 'tag' }}

jobs:
  detect:
    name: Detect affected apps
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      backend: ${{ steps.affected.outputs.backend }}
      frontend: ${{ steps.affected.outputs.frontend }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Determine affected apps
        id: affected
        uses: ./.github/actions/detect-affected
        with:
          event-name: ${{ github.event_name }}
          before-sha: ${{ github.event.before }}
          head-sha: ${{ github.sha }}

  # ── Build jobs ────────────────────────────────────────────────────────────
  build-backend:
    name: Build Backend Image
    needs: detect
    if: needs.detect.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: dev
    permissions:
      id-token: write
      contents: read
    outputs:
      image-uri: ${{ steps.set-uri.outputs.image-uri }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-Build

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build and push backend Docker image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: apps/backend-boilerplate/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          tags: |
            ${{ vars.ECR_BACKEND_REPOSITORY_URL }}:${{ env.IMAGE_TAG }}
            ${{ vars.ECR_BACKEND_REPOSITORY_URL }}:latest
          build-args: |
            DATABASE_URL=postgresql://placeholder:placeholder@placeholder:5432/placeholder?schema=public
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set image URI output
        id: set-uri
        run: echo "image-uri=${{ vars.ECR_BACKEND_REPOSITORY_URL }}:${{ env.IMAGE_TAG }}" >> "$GITHUB_OUTPUT"

  build-frontend:
    name: Build Frontend Image
    needs: detect
    if: needs.detect.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: dev
    permissions:
      id-token: write
      contents: read
    outputs:
      image-uri: ${{ steps.set-uri.outputs.image-uri }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-Build

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build and push frontend Docker image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: apps/nextjs-boilerplate/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          tags: |
            ${{ vars.ECR_FRONTEND_REPOSITORY_URL }}:${{ env.IMAGE_TAG }}
            ${{ vars.ECR_FRONTEND_REPOSITORY_URL }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_BASE_URL=${{ vars.NEXT_PUBLIC_BASE_URL }}
            NEXT_PUBLIC_SENTRY_DSN=${{ vars.NEXT_PUBLIC_SENTRY_DSN }}

      - name: Set image URI output
        id: set-uri
        run: echo "image-uri=${{ vars.ECR_FRONTEND_REPOSITORY_URL }}:${{ env.IMAGE_TAG }}" >> "$GITHUB_OUTPUT"

  # ── Dev deploy jobs ────────────────────────────────────────────────────────
  deploy-dev-backend:
    name: Deploy Backend → Dev
    needs: [detect, build-backend]
    if: needs.detect.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: dev
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-Deploy-Dev

      - name: Deploy backend Lambda
        uses: ./.github/actions/deploy-lambda
        with:
          function-name: ${{ github.event.repository.name }}-dev-backend
          image-uri: ${{ needs.build-backend.outputs.image-uri }}
          alias-name: dev
          codedeploy-app: ${{ github.event.repository.name }}-dev-backend
          codedeploy-group: ${{ github.event.repository.name }}-dev-backend-dg
          aws-region: ${{ env.AWS_REGION }}
          git-sha: ${{ github.sha }}
          release-tag: ${{ env.IMAGE_TAG }}

  deploy-dev-frontend:
    name: Deploy Frontend → Dev
    needs: [detect, build-frontend]
    if: needs.detect.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: dev
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-Deploy-Dev

      - name: Deploy frontend Lambda
        uses: ./.github/actions/deploy-lambda
        with:
          function-name: ${{ github.event.repository.name }}-dev-frontend
          image-uri: ${{ needs.build-frontend.outputs.image-uri }}
          alias-name: dev
          codedeploy-app: ${{ github.event.repository.name }}-dev-frontend
          codedeploy-group: ${{ github.event.repository.name }}-dev-frontend-dg
          aws-region: ${{ env.AWS_REGION }}
          git-sha: ${{ github.sha }}
          release-tag: ${{ env.IMAGE_TAG }}

      - name: Deploy static assets and invalidate CloudFront
        uses: ./.github/actions/deploy-static-assets
        with:
          image-uri: ${{ needs.build-frontend.outputs.image-uri }}
          static-assets-bucket: ${{ vars.STATIC_ASSETS_BUCKET }}
          cloudfront-distribution-id: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}
          aws-region: ${{ env.AWS_REGION }}

  # ── Prod deploy jobs ───────────────────────────────────────────────────────
  deploy-prod-backend:
    name: Deploy Backend → Prod
    needs: [detect, build-backend, deploy-dev-backend]
    if: >-
      needs.detect.outputs.backend == 'true' &&
      github.event_name == 'push' && github.ref_type == 'tag'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: prod
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-Deploy-Prod

      - name: Deploy backend Lambda
        uses: ./.github/actions/deploy-lambda
        with:
          function-name: ${{ github.event.repository.name }}-prod-backend
          image-uri: ${{ needs.build-backend.outputs.image-uri }}
          alias-name: prod
          codedeploy-app: ${{ github.event.repository.name }}-prod-backend
          codedeploy-group: ${{ github.event.repository.name }}-prod-backend-dg
          aws-region: ${{ env.AWS_REGION }}
          git-sha: ${{ github.sha }}
          release-tag: ${{ env.IMAGE_TAG }}

  deploy-prod-frontend:
    name: Deploy Frontend → Prod
    needs: [detect, build-frontend, deploy-dev-frontend]
    if: >-
      needs.detect.outputs.frontend == 'true' &&
      github.event_name == 'push' && github.ref_type == 'tag'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: prod
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-Deploy-Prod

      - name: Deploy frontend Lambda
        uses: ./.github/actions/deploy-lambda
        with:
          function-name: ${{ github.event.repository.name }}-prod-frontend
          image-uri: ${{ needs.build-frontend.outputs.image-uri }}
          alias-name: prod
          codedeploy-app: ${{ github.event.repository.name }}-prod-frontend
          codedeploy-group: ${{ github.event.repository.name }}-prod-frontend-dg
          aws-region: ${{ env.AWS_REGION }}
          git-sha: ${{ github.sha }}
          release-tag: ${{ env.IMAGE_TAG }}

      - name: Deploy static assets and invalidate CloudFront
        uses: ./.github/actions/deploy-static-assets
        with:
          image-uri: ${{ needs.build-frontend.outputs.image-uri }}
          static-assets-bucket: ${{ vars.STATIC_ASSETS_BUCKET }}
          cloudfront-distribution-id: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}
          aws-region: ${{ env.AWS_REGION }}
