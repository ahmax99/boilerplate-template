name: React Doctor

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'apps/nextjs-boilerplate/**'
      - '.github/workflows/react-doctor.yml'
  push:
    branches:
      - main
    paths:
      - 'apps/nextjs-boilerplate/**'
      - '.github/workflows/react-doctor.yml'
      
permissions:
  contents: read
  pull-requests: write
  issues: write
  statuses: write

concurrency:
  group: react-doctor-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  react-doctor:
    name: React Doctor
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]' && !startsWith(github.head_ref, 'release-please--branches--')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: React Doctor scan
        uses: millionco/react-doctor@v2
        with:
          blocking: error
