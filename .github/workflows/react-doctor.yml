name: React Doctor

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'apps/nextjs-boilerplate/**'
      - '.github/workflows/react-doctor.yml'
  push:
    branches:
      - main
    paths:
      - 'apps/nextjs-boilerplate/**'
      - '.github/workflows/react-doctor.yml'

permissions:
  contents: read
  pull-requests: write
  statuses: write

concurrency:
  group: react-doctor-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  react-doctor:
    name: React Doctor
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.actor != 'dependabot[bot]' && !startsWith(github.head_ref, 'release-please--branches--')

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: React Doctor scan
        uses: millionco/react-doctor@938008119a288f2fb47c66a69cd9279a21f31784 # v2
        with:
          blocking: error
