name: Terraform Apply

on:
  push:
    branches:
      - main
    paths:
      - 'infra/terraform/**'
    tags:
      - 'v*'
  workflow_dispatch: # dev only — prod requires a v* tag push

permissions:
  id-token: write
  contents: read

concurrency:
  group: terraform-apply-${{ github.ref_type == 'tag' && github.ref_name || 'dev' }}
  cancel-in-progress: false

jobs:
  apply-dev:
    name: Terraform Apply → Dev
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: dev

    env:
      TF_IN_AUTOMATION: 'true'
      AWS_REGION: ${{ vars.AWS_REGION }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Export Terraform variables
        uses: ./.github/actions/terraform-env
        with:
          environment: dev
          create-github-oidc-provider: 'true'
          aws-region: ${{ vars.AWS_REGION }}
          root-domain: ${{ vars.TF_VAR_root_domain }}
          contact-to-email: ${{ vars.TF_VAR_contact_to_email }}
          from-email: ${{ vars.TF_VAR_from_email }}
          database-url: ${{ secrets.TF_VAR_database_url }}
          google-client-id: ${{ secrets.TF_VAR_google_client_id }}
          google-client-secret: ${{ secrets.TF_VAR_google_client_secret }}
          resend-api-key: ${{ secrets.TF_VAR_resend_api_key }}
          session-secret: ${{ secrets.TF_VAR_session_secret }}
          sentry-dsn: ${{ secrets.TF_VAR_sentry_dsn }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: '~> 1.14'
          # terraform_wrapper=false lets bootstrap capture `terraform output -raw` via subshell
          terraform_wrapper: false

      - name: Configure AWS credentials (apply role)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.TF_APPLY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: TerraformApplyDev

      - name: Apply (dev)
        uses: ./.github/actions/terraform-apply-env
        with:
          environment: dev
          project-name: ${{ github.event.repository.name }}
          aws-region: ${{ env.AWS_REGION }}
          next-public-base-url: ${{ vars.NEXT_PUBLIC_BASE_URL }}
          next-public-backend-url: ${{ vars.NEXT_PUBLIC_BACKEND_URL }}
          next-public-sentry-dsn: ${{ vars.NEXT_PUBLIC_SENTRY_DSN }}

  apply-prod:
    name: Terraform Apply → Prod
    needs: apply-dev
    if: github.event_name == 'push' && github.ref_type == 'tag'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: prod # required-reviewer gate (already configured for deploy.yml)

    env:
      TF_IN_AUTOMATION: 'true'
      AWS_REGION: ${{ vars.AWS_REGION }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Export Terraform variables
        uses: ./.github/actions/terraform-env
        with:
          environment: prod
          create-github-oidc-provider: 'false'
          aws-region: ${{ vars.AWS_REGION }}
          root-domain: ${{ vars.TF_VAR_root_domain }}
          contact-to-email: ${{ vars.TF_VAR_contact_to_email }}
          from-email: ${{ vars.TF_VAR_from_email }}
          database-url: ${{ secrets.TF_VAR_database_url }}
          google-client-id: ${{ secrets.TF_VAR_google_client_id }}
          google-client-secret: ${{ secrets.TF_VAR_google_client_secret }}
          resend-api-key: ${{ secrets.TF_VAR_resend_api_key }}
          session-secret: ${{ secrets.TF_VAR_session_secret }}
          sentry-dsn: ${{ secrets.TF_VAR_sentry_dsn }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: '~> 1.14'
          terraform_wrapper: false

      - name: Configure AWS credentials (apply role)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.TF_APPLY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: TerraformApplyProd

      - name: Apply (prod)
        uses: ./.github/actions/terraform-apply-env
        with:
          environment: prod
          project-name: ${{ github.event.repository.name }}
          aws-region: ${{ env.AWS_REGION }}
          next-public-base-url: ${{ vars.NEXT_PUBLIC_BASE_URL }}
          next-public-backend-url: ${{ vars.NEXT_PUBLIC_BACKEND_URL }}
          next-public-sentry-dsn: ${{ vars.NEXT_PUBLIC_SENTRY_DSN }}
