name: Terraform Plan

on:
  pull_request:
    branches:
      - main
    paths:
      - 'infra/terraform/**'

permissions:
  id-token: write
  contents: read
  pull-requests: write

concurrency:
  group: terraform-plan-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: dev

    env:
      TF_IN_AUTOMATION: "true"
      AWS_REGION: ${{ vars.AWS_REGION }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Export Terraform variables
        uses: ./.github/actions/terraform-env
        with:
          environment: dev
          database-url: ${{ secrets.TF_VAR_database_url }}
          google-client-id: ${{ secrets.TF_VAR_google_client_id }}
          google-client-secret: ${{ secrets.TF_VAR_google_client_secret }}
          resend-api-key: ${{ secrets.TF_VAR_resend_api_key }}
          session-secret: ${{ secrets.TF_VAR_session_secret }}
          sentry-dsn: ${{ secrets.TF_VAR_sentry_dsn }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: "~> 1.14"

      - name: Configure AWS credentials (plan role)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.TF_PLAN_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: TerraformPlan

      - name: Terraform fmt check
        run: terraform -chdir=infra/terraform fmt -check -recursive

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@90f302c255ef959cbfb4bd10581afecdb7ece3e6 # v4
        with:
          tflint_version: v0.63.1

      - name: Init TFLint
        run: tflint --chdir=infra/terraform --init
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run TFLint
        run: tflint --chdir=infra/terraform --recursive --format compact --minimum-failure-severity=error

      - name: Terraform init
        run: terraform -chdir=infra/terraform init -backend-config=backends/dev.hcl

      - name: Terraform validate
        run: terraform -chdir=infra/terraform validate

      - name: Terraform plan
        id: plan
        # Capture exit code separately; 0=no changes, 1=error, 2=changes present
        run: |
          set +e
          terraform -chdir=infra/terraform plan \
            -no-color \
            -lock-timeout=300s \
            2>&1 | tee /tmp/plan-output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          set -e
          [ "$EXIT_CODE" -ne 1 ]

      - name: Post or update PR comment
        if: always()
        uses: ./.github/actions/terraform-plan-comment
        with:
          plan-file: /tmp/plan-output.txt
          environment: dev
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pr-number: ${{ github.event.pull_request.number }}
