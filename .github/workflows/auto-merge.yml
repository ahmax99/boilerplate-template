name: Auto-merge PR

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: auto-merge-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  dependabot-auto-merge:
    name: Auto-merge Dependabot PR
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.actor == 'dependabot[bot]'
    permissions:
      contents: write
      pull-requests: write
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        id: meta
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@21025c705c08248db411dc16f3619e6b5f9ea21a # v2
      - name: Auto-merge eligible updates
        if: >
          steps.metadata.outputs.update-type != 'version-update:semver-major' &&
          (steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
           steps.metadata.outputs.package-ecosystem == 'github-actions')
        run: |
          gh pr review "$GITHUB_HEAD_REF" --approve
          gh pr merge "$GITHUB_HEAD_REF" --auto --squash
