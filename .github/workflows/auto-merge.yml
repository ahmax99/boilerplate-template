name: Auto-merge PR

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  dependabot-auto-merge:
    name: Auto-merge Dependabot PR
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    permissions:
      contents: write
      pull-requests: write
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        id: meta
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
      - name: Auto-merge eligible updates
        if: >
          steps.metadata.outputs.update-type != 'version-update:semver-major' &&
          (steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
           steps.metadata.outputs.package-ecosystem == 'github-actions')
        run: |
          gh pr review "$GITHUB_HEAD_REF" --approve
          gh pr merge "$GITHUB_HEAD_REF" --auto --squash --rebase

  github-dir-auto-merge:
    name: Auto-merge .github/-only PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Check if all changes are within .github/
        id: check_files
        run: |
          non_github=$(gh pr view ${{ github.event.pull_request.number }} \
            --json files \
            --jq '[.files[].path | select(startswith(".github/") | not)] | length')
          echo "count=$non_github" >> "$GITHUB_OUTPUT"

      - name: Auto-merge if only .github/ files changed
        if: steps.check_files.outputs.count == '0'
        run: |
          gh pr review ${{ github.event.pull_request.number }} --approve
          gh pr merge ${{ github.event.pull_request.number }} --auto --squash --rebase
