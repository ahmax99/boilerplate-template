name: 'Terraform Bootstrap'
description: 'Creates ECR repos, builds and pushes Docker images, runs full apply, and publishes Lambda versions'

inputs:
  aws-region:
    description: 'AWS region'
    required: true
  next-public-base-url:
    description: 'NEXT_PUBLIC_BASE_URL passed to the frontend Docker build'
    required: false
    default: ''
  next-public-backend-url:
    description: 'NEXT_PUBLIC_BACKEND_URL passed to the frontend Docker build'
    required: false
    default: ''
  next-public-sentry-dsn:
    description: 'NEXT_PUBLIC_SENTRY_DSN passed to the frontend Docker build'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Login to Amazon ECR
      uses: aws-actions/amazon-ecr-login@v2

    - name: Bootstrap infrastructure
      shell: bash
      env:
        AWS_REGION: ${{ inputs.aws-region }}
        NEXT_PUBLIC_BASE_URL: ${{ inputs.next-public-base-url }}
        NEXT_PUBLIC_BACKEND_URL: ${{ inputs.next-public-backend-url }}
        NEXT_PUBLIC_SENTRY_DSN: ${{ inputs.next-public-sentry-dsn }}
      run: |
        chmod +x .github/scripts/terraform-bootstrap.sh .github/scripts/build-and-push.sh
        .github/scripts/terraform-bootstrap.sh
