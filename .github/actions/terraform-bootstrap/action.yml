name: 'Terraform Bootstrap'
description: 'Creates ECR repos, builds and pushes Docker images, runs full apply, and publishes Lambda versions'

inputs:
  aws-region:
    description: 'AWS region'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Login to Amazon ECR
      uses: aws-actions/amazon-ecr-login@v2

    - name: Bootstrap infrastructure
      shell: bash
      env:
        AWS_REGION: ${{ inputs.aws-region }}
      run: |
        chmod +x .github/scripts/terraform-bootstrap.sh .github/scripts/build-and-push.sh
        .github/scripts/terraform-bootstrap.sh
