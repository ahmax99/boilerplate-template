name: 'Terraform Apply (per environment)'
description: 'init + idempotent apply (bootstrap or steady-state) + job summary for one environment'

inputs:
  environment:
    description: 'Environment name (dev, prod) — selects backend config and ECR repo names'
    required: true
  project-name:
    description: 'Project name used to construct ECR repo names'
    required: true
  aws-region:
    description: 'AWS region'
    required: true
  next-public-base-url:
    description: 'NEXT_PUBLIC_BASE_URL for the frontend Docker build (bootstrap path only)'
    required: false
    default: ''
  next-public-backend-url:
    description: 'NEXT_PUBLIC_BACKEND_URL for the frontend Docker build (bootstrap path only)'
    required: false
    default: ''
  next-public-sentry-dsn:
    description: 'NEXT_PUBLIC_SENTRY_DSN for the frontend Docker build (bootstrap path only)'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Terraform init
      shell: bash
      run: terraform -chdir=infra/terraform init -reconfigure -backend-config=backends/${{ inputs.environment }}.hcl

    # ── Idempotency check: does :latest exist in both ECR repos for this env? ──
    - name: Check ECR image state
      id: ecr-check
      uses: ./.github/actions/terraform-ecr-check
      with:
        project-name: ${{ inputs.project-name }}
        environment: ${{ inputs.environment }}
        aws-region: ${{ inputs.aws-region }}

    # ── BOOTSTRAP PATH (fresh env) ────────────────────────────────────────────
    - name: Bootstrap
      if: steps.ecr-check.outputs.mode == 'bootstrap'
      uses: ./.github/actions/terraform-bootstrap
      with:
        aws-region: ${{ inputs.aws-region }}
        next-public-base-url: ${{ inputs.next-public-base-url }}
        next-public-backend-url: ${{ inputs.next-public-backend-url }}
        next-public-sentry-dsn: ${{ inputs.next-public-sentry-dsn }}

    # ── STEADY-STATE PATH ─────────────────────────────────────────────────────
    - name: Steady-state — Plan
      if: steps.ecr-check.outputs.mode == 'steady-state'
      shell: bash
      run: terraform -chdir=infra/terraform plan -no-color -lock-timeout=300s -out=tfplan.binary

    - name: Steady-state — Apply
      if: steps.ecr-check.outputs.mode == 'steady-state'
      shell: bash
      run: terraform -chdir=infra/terraform apply -auto-approve -lock-timeout=300s tfplan.binary

    # ── SUMMARY ───────────────────────────────────────────────────────────────
    - name: Surface outputs to job summary
      if: always()
      shell: bash
      run: |
        {
          echo "## Terraform Apply — ${{ inputs.environment }}"
          echo "**Mode:** ${{ steps.ecr-check.outputs.mode }}"
          echo ""
          echo "### Outputs"
          echo '```'
          terraform -chdir=infra/terraform output 2>/dev/null || echo "(outputs unavailable)"
          echo '```'
        } >> "$GITHUB_STEP_SUMMARY"
