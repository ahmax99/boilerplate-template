name: 'Terraform Variables'
description: 'Exports the shared TF_VAR_* environment to $GITHUB_ENV so downstream Terraform steps pick them up. Single source of truth for the TF var mapping shared by the plan and apply jobs — add new vars here, not in each caller.'

inputs:
  environment:
    description: 'Target environment (dev, prod) — sets TF_VAR_environment'
    required: true
  database-url:
    description: 'TF_VAR_database_url (secret)'
    required: true
  google-client-id:
    description: 'TF_VAR_google_client_id (secret)'
    required: true
  google-client-secret:
    description: 'TF_VAR_google_client_secret (secret)'
    required: true
  resend-api-key:
    description: 'TF_VAR_resend_api_key (secret)'
    required: true
  session-secret:
    description: 'TF_VAR_session_secret (secret)'
    required: true
  backend-sentry-dsn:
    description: 'TF_VAR_backend_sentry_dsn (secret)'
    required: true
  frontend-sentry-dsn:
    description: 'TF_VAR_frontend_sentry_dsn (secret)'
    required: true
  central-ecr-account-id:
    description: 'TF_VAR_central_ecr_account_id — shared-services account ID hosting the central ECR registry (non-secret; same value for every environment)'
    required: true
  dns-account-role-arn:
    description: 'TF_VAR_dns_account_role_arn — role to assume in the shared-services account for cross-account apex-zone writes (non-secret; empty on dev, whose env zone lives in-account)'
    required: true
  github-org:
    description: 'TF_VAR_github_org — repository owner, for the app-deploy role OIDC trust (supply github.repository_owner)'
    required: true
  github-org-id:
    description: 'TF_VAR_github_org_id — numeric owner ID for the immutable OIDC subject (supply github.repository_owner_id)'
    required: true
  github-repo-id:
    description: 'TF_VAR_github_repo_id — numeric repository ID for the immutable OIDC subject (supply github.repository_id)'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Export TF_VAR_* environment
      shell: bash
      env:
        TF_VAR_project_name: ${{ github.event.repository.name }}
        TF_VAR_environment: ${{ inputs.environment }}
        TF_VAR_aws_region: ${{ inputs.aws-region }}
        TF_VAR_root_domain: ${{ inputs.root-domain }}
        TF_VAR_contact_to_email: ${{ inputs.contact-to-email }}
        TF_VAR_from_email: ${{ inputs.from-email }}
        TF_VAR_database_url: ${{ inputs.database-url }}
        TF_VAR_google_client_id: ${{ inputs.google-client-id }}
        TF_VAR_google_client_secret: ${{ inputs.google-client-secret }}
        TF_VAR_resend_api_key: ${{ inputs.resend-api-key }}
        TF_VAR_session_secret: ${{ inputs.session-secret }}
        TF_VAR_backend_sentry_dsn: ${{ inputs.backend-sentry-dsn }}
        TF_VAR_frontend_sentry_dsn: ${{ inputs.frontend-sentry-dsn }}
        TF_VAR_central_ecr_account_id: ${{ inputs.central-ecr-account-id }}
        TF_VAR_dns_account_role_arn: ${{ inputs.dns-account-role-arn }}
        TF_VAR_github_org: ${{ inputs.github-org }}
        TF_VAR_github_org_id: ${{ inputs.github-org-id }}
        TF_VAR_github_repo_id: ${{ inputs.github-repo-id }}
      run: |
        {
          echo "TF_VAR_project_name=$TF_VAR_project_name"
          echo "TF_VAR_environment=$TF_VAR_environment"
          echo "TF_VAR_aws_region=$TF_VAR_aws_region"
          echo "TF_VAR_root_domain=$TF_VAR_root_domain"
          echo "TF_VAR_contact_to_email=$TF_VAR_contact_to_email"
          echo "TF_VAR_from_email=$TF_VAR_from_email"
          echo "TF_VAR_database_url=$TF_VAR_database_url"
          echo "TF_VAR_google_client_id=$TF_VAR_google_client_id"
          echo "TF_VAR_google_client_secret=$TF_VAR_google_client_secret"
          echo "TF_VAR_resend_api_key=$TF_VAR_resend_api_key"
          echo "TF_VAR_session_secret=$TF_VAR_session_secret"
          echo "TF_VAR_backend_sentry_dsn=$TF_VAR_backend_sentry_dsn"
          echo "TF_VAR_frontend_sentry_dsn=$TF_VAR_frontend_sentry_dsn"
          echo "TF_VAR_central_ecr_account_id=$TF_VAR_central_ecr_account_id"
          echo "TF_VAR_dns_account_role_arn=$TF_VAR_dns_account_role_arn"
          echo "TF_VAR_github_org=$TF_VAR_github_org"
          echo "TF_VAR_github_org_id=$TF_VAR_github_org_id"
          echo "TF_VAR_github_repo_id=$TF_VAR_github_repo_id"
        } >> "$GITHUB_ENV"
