name: 'Promote ECR Image'
description: 'Cross-account pull-then-push of a built image into another ECR repo, skipping if the target tag already exists (immutable tags)'

inputs:
  repository-name:
    description: 'Target ECR repository name (not the full URL) — used for the pre-existence check'
    required: true
  source-image-uri:
    description: 'Source image URI to promote from (e.g. the dev repo build)'
    required: true
  target-image-uri:
    description: 'Target image URI to promote into, same tag (e.g. the prod repo)'
    required: true
  aws-region:
    description: 'AWS region'
    required: true
  source-account-id:
    description: 'AWS account ID hosting the source registry (dev)'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Resolve target account ID
      id: target-account
      shell: bash
      run: echo "account-id=$(aws sts get-caller-identity --query Account --output text)" >> "$GITHUB_OUTPUT"

    - name: Login to Amazon ECR
      uses: aws-actions/amazon-ecr-login@v2
      with:
        registries: '${{ inputs.source-account-id }},${{ steps.target-account.outputs.account-id }}'

    - name: Promote image (pull-then-push)
      shell: bash
      env:
        REPOSITORY_NAME: ${{ inputs.repository-name }}
        SOURCE_IMAGE_URI: ${{ inputs.source-image-uri }}
        TARGET_IMAGE_URI: ${{ inputs.target-image-uri }}
        AWS_REGION: ${{ inputs.aws-region }}
      run: |
        chmod +x .github/scripts/promote-image.sh
        .github/scripts/promote-image.sh \
          "$REPOSITORY_NAME" \
          "$SOURCE_IMAGE_URI" \
          "$TARGET_IMAGE_URI" \
          "$AWS_REGION"
