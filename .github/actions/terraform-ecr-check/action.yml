name: 'Check Terraform ECR Image State'
description: 'Detects whether ECR repos have :latest images and outputs bootstrap or steady-state mode'

inputs:
  project-name:
    description: 'Project name used to construct ECR repository names'
    required: true
  environment:
    description: 'Environment name (e.g. dev, prod)'
    required: true
  aws-region:
    description: 'AWS region'
    required: true

outputs:
  mode:
    description: 'bootstrap — images absent; steady-state — images present'
    value: ${{ steps.check.outputs.mode }}

runs:
  using: 'composite'
  steps:
    - name: Check ECR image state
      id: check
      shell: bash
      env:
        PROJECT_NAME: ${{ inputs.project-name }}
        ENVIRONMENT: ${{ inputs.environment }}
        AWS_REGION: ${{ inputs.aws-region }}
      run: |
        chmod +x .github/scripts/terraform-ecr-check.sh
        .github/scripts/terraform-ecr-check.sh
